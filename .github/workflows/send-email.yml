name: Send Email

'on':
  push:
   branches:
    - main

jobs:
 send-email:
  runs-on: ubuntu-latest
  steps:
  - name: Checkout Repository
    uses: actions/checkout@v4
    with:
      fetch-depth: 2

  - name: Get Changed File
    id: changed-file
    run: |
      echo "FILE=$(git diff --name-only HEAD^ HEAD | tail -n 1)" >> $GITHUB_OUTPUT

  - name: Send Email with Attachment
    uses: dawidd6/action-send-mail@v3
    with:
      server_address: smtp.gmail.com
      server_port: 465
      secure: true
      username: ${{ secrets.EMAIL_USERNAME }}
      password: ${{ secrets.EMAIL_PASSWORD }}

      subject: New File Uploaded

      body: |
        A new file was uploaded to GitHub.

      to: bashipaka18@gmail.com
      from: GitHub Automation

      attachments: ${{ steps.changed-file.outputs.FILE }}

